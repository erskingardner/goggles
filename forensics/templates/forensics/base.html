{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Goggles{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'forensics/styles.css' %}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{% url 'incident-list' %}">Goggles</a>
    <nav class="nav">
      {% if request.user.is_authenticated %}
        <span>{{ request.user.username }}</span>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit">Log out</button>
        </form>
      {% endif %}
    </nav>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
