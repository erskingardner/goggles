services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: ${GOGGLES_ENV_FILE:-.env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-test:
    image: postgres:17-alpine
    profiles: ["test"]
    environment:
      POSTGRES_DB: goggles_test
      POSTGRES_USER: goggles
      POSTGRES_PASSWORD: goggles
    tmpfs:
      - /var/lib/postgresql/data
    ports:
      - "127.0.0.1:${GOGGLES_TEST_DB_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 5s

  web:
    build: .
    init: true
    restart: unless-stopped
    env_file: ${GOGGLES_ENV_FILE:-.env}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./var/static-assets:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; host = os.environ.get('DJANGO_ALLOWED_HOSTS', '127.0.0.1').split(',')[0].strip(); request = urllib.request.Request('http://127.0.0.1:8000/healthz/', headers={'Host': host}); urllib.request.urlopen(request, timeout=2).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  static:
    image: nginx:1.29-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./var/static-assets:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:8001:80"

volumes:
  postgres-data:
